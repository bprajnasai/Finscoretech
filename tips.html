<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinscoreTech - AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container" data-page="tips">
        <header>
            <h1 class="page-title">AI Chatbot Assistant</h1>
            <p class="subtitle">Ask me anything about finance!</p>
        </header>
        <main class="content-card chatbot-card">
            <div id="chat-window">
                <div class="chat-message bot-message">Hello! I'm your FinscoreTech assistant. How can I help you?</div>
            </div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Type your question..." required>
                <button type="submit" class="send-button">Send</button>
            </form>
        </main>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
