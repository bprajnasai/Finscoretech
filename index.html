<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinScoreTech</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="background-animation"></div>

  <div class="wrapper">
    <header>
      <h1 class="animated-heading">🚀 FinScoreTech</h1>
      <p class="tagline">Smart Financial Health Checker</p>
    </header>

    <main class="container">
      <form id="fin-form">
        <div class="form-group">
          <label for="income">Monthly Income (₹)</label>
          <input type="number" id="income" placeholder="e.g. 50000" required />
        </div>
        <div class="form-group">
          <label for="expenses">Monthly Expenses (₹)</label>
          <input type="number" id="expenses" placeholder="e.g. 25000" required />
        </div>
        <div class="form-group">
          <label for="savings">Current Savings (₹)</label>
          <input type="number" id="savings" placeholder="e.g. 150000" required />
        </div>
        <button type="submit">✨ Calculate FinScore</button>
      </form>
      <div id="result" class="result-box"></div>
    </main>

    <footer>
      <p>Made with ❤️ by Prajna | © 2025 FinScoreTech</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
