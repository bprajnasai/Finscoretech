
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FinScoreTech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>💸 FinScoreTech – Smart Finance Dashboard</h1>

  <div class="container">
    <div>
      <input id="incomeInput" type="number" placeholder="Enter Income ₹" />
      <input id="expenseInput" type="number" placeholder="Enter Expense ₹" />
      <button onclick="addTransaction()">Add</button>
    </div>

    <div id="summary">
      <p><strong>Total Income:</strong> ₹<span id="totalIncome">0</span></p>
      <p><strong>Total Expense:</strong> ₹<span id="totalExpense">0</span></p>
      <p><strong>FinScore™:</strong> <span id="finScore">0</span></p>
      <p id="tip"></p>
      <button onclick="downloadReport()">Download PDF Report</button>
    </div>

    <canvas id="expenseChart" width="300" height="300"></canvas>
  </div>

  <script src="chart.min.js"></script>
  <script src="jspdf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
